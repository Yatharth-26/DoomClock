<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoomClock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>DoomClock</h1>
        <p>Your time is running out. Use it wisely.</p>
    </header>

    <main class="container">

        <div class="card">
            <h2>Motivational Quote</h2>
            <button id="quoteBtn">Get Quote</button>
            <p id="quote">Click the button to load a quote</p>
        </div>

        <div class="card">
            <h2>Random Activity</h2>
            <button id="activityBtn">Get Activity</button>
            <p id="activity">Click the button to load an activity</p>
        </div>

        <div class="card">
            <h2>Advice</h2>
            <button id="adviceBtn">Get Advice</button>
            <p id="advice">Click the button to load advice</p>
        </div>

    </main>

    <footer>
        <p>DoomClock Project</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
